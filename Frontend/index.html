<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratix – Shop Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .auth-card {
            background: #fff;
            border-radius: 16px;
            padding: 36px 40px 40px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.07);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #111;
            margin-bottom: 6px;
        }

        .logo-sub {
            font-size: 0.82rem;
            color: #888;
            margin-bottom: 28px;
        }

        .tab-row {
            display: flex;
            border-bottom: 1px solid #ececec;
            margin-bottom: 24px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 0;
            margin-right: 24px;
            font-size: 0.92rem;
            font-weight: 600;
            color: #aaa;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #111;
            border-bottom-color: #111;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 14px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        input {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.92rem;
            color: #111;
            background: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input:focus {
            border-color: #333;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
            background: #fff;
            outline: none;
        }

        input::placeholder {
            color: #bbb;
        }

        select {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.92rem;
            color: #111;
            background: #fafafa;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

        select:focus {
            border-color: #333;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        .submit-btn:hover:not(:disabled) {
            background: #333;
        }

        .submit-btn:active:not(:disabled) {
            transform: scale(0.99);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            display: none;
        }

        .spinner.on {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .alert {
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 0.84rem;
            margin-bottom: 16px;
            display: none;
            line-height: 1.4;
        }

        .alert.error {
            background: #fff2f2;
            border: 1px solid #fcc;
            color: #c0392b;
        }

        .alert.success {
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            color: #276749;
        }

        .alert.on {
            display: block;
        }

        /* Section divider inside register form */
        .field-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #bbb;
            margin: 18px 0 10px;
        }

        /* Logged-in state */
        .dashboard-view {
            display: none;
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.07);
            text-align: center;
        }

        .shop-avatar {
            width: 56px;
            height: 56px;
            background: #111;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 1.4rem;
        }

        .shop-name-display {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .shop-email-display {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        .info-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f5f5f5;
            border-radius: 99px;
            padding: 7px 16px;
            font-size: 0.82rem;
            color: #555;
            margin-bottom: 24px;
        }

        .info-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
        }

        .signout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px 24px;
            font-size: 0.88rem;
            cursor: pointer;
            color: #555;
            font-weight: 500;
            transition: all 0.2s;
        }

        .signout-btn:hover {
            border-color: #111;
            color: #111;
        }

        /* Notice box below card */
        .notice {
            text-align: center;
            font-size: 0.78rem;
            color: #aaa;
            margin-top: 16px;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">

        <!-- Auth Card -->
        <div class="auth-card" id="auth-card">
            <div class="logo">Ratix</div>
            <div class="logo-sub">Shop Management & Credit Platform</div>

            <div class="tab-row">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register Shop</button>
            </div>

            <div class="alert error" id="alert-error"></div>
            <div class="alert success" id="alert-success"></div>

            <!-- ==================== LOGIN FORM ==================== -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="shopowner@email.com" required
                        autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="submit-btn" id="login-btn">
                    <div class="spinner" id="login-spinner"></div>
                    <span id="login-label">Sign In to Dashboard</span>
                </button>
            </form>

            <!-- ==================== REGISTER FORM ==================== -->
            <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">

                <!-- Shop Details -->
                <div class="field-section-title">🏪 Shop Details</div>

                <div class="form-group">
                    <label for="reg-shop-name">Shop / Business Name *</label>
                    <input type="text" id="reg-shop-name" placeholder="e.g. Sharma General Store" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-shop-type">Shop Type *</label>
                        <select id="reg-shop-type" required>
                            <option value="" disabled selected>Select type</option>
                            <option value="kirana">Kirana / General Store</option>
                            <option value="wholesale">Wholesale</option>
                            <option value="grocery">Grocery</option>
                            <option value="pharmacy">Pharmacy</option>
                            <option value="electronics">Electronics</option>
                            <option value="clothing">Clothing / Textile</option>
                            <option value="hardware">Hardware</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reg-city">City / Area *</label>
                        <input type="text" id="reg-city" placeholder="e.g. Delhi, Noida" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-gst">GST Number (optional)</label>
                        <input type="text" id="reg-gst" placeholder="e.g. 22AAAAA0000A1Z5"
                               maxlength="15" style="text-transform:uppercase;"
                               oninput="this.value=this.value.toUpperCase()">
                    </div>
                    <div class="form-group">
                        <label for="reg-address">Shop Address</label>
                        <input type="text" id="reg-address" placeholder="Street / Area">
                    </div>
                </div>

                <!-- Owner Details -->
                <div class="field-section-title">👤 Owner Details</div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-owner-name">Owner Name *</label>
                        <input type="text" id="reg-owner-name" placeholder="Full name" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-phone">Phone Number *</label>
                        <input type="tel" id="reg-phone" placeholder="10-digit number" required pattern="[0-9]{10}"
                            maxlength="10">
                    </div>
                </div>

                <!-- Account Details -->
                <div class="field-section-title">🔐 Account Credentials</div>

                <div class="form-group">
                    <label for="reg-email">Email Address *</label>
                    <input type="email" id="reg-email" placeholder="shopowner@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password *</label>
                    <input type="password" id="reg-password" placeholder="Min. 6 characters" required minlength="6"
                        autocomplete="new-password">
                </div>

                <button type="submit" class="submit-btn" id="register-btn">
                    <div class="spinner" id="register-spinner"></div>
                    <span id="register-label">Register My Shop</span>
                </button>
            </form>
        </div>

        <!-- Dashboard (post-login) -->
        <div class="dashboard-view" id="dashboard-view">
            <div class="shop-avatar">🏪</div>
            <div class="shop-name-display" id="dash-shop-name">Your Shop</div>
            <div class="shop-email-display" id="dash-email">—</div>
            <div class="info-pill">
                <div class="info-dot"></div>
                Logged in — session saved on this device
            </div>
            <br>
            <button class="signout-btn" onclick="handleSignOut()">Sign Out</button>
        </div>

        <div class="notice" id="auth-notice">
            By registering, you confirm this is a legitimate business account.
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <script>
        // =====================================================
        //  Supabase Client
        // =====================================================
        const SUPABASE_URL = 'https://ixeausiogmzweppiytfy.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4ZWF1c2lvZ216d2VwcGl5dGZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3Mjc4NjYsImV4cCI6MjA5ODMwMzg2Nn0.Z08IWCr10Vjuj9y_OgvsE4yFViv2jNQ1t1nwVMIaOy0';

        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

        // =====================================================
        //  On Load: restore session if exists
        // =====================================================
        (async () => {
            const { data: { session } } = await db.auth.getSession();
            if (session) showDashboard(session.user);
        })();

        db.auth.onAuthStateChange((_event, session) => {
            if (session) showDashboard(session.user);
            else showAuth();
        });

        // =====================================================
        //  Tab Switching
        // =====================================================
        function switchTab(tab) {
            clearAlerts();
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('auth-notice').style.display = tab === 'register' ? 'block' : 'none';
        }

        // =====================================================
        //  LOGIN
        // =====================================================
        async function handleLogin(e) {
            e.preventDefault();
            clearAlerts();
            loading('login', true);

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            const { error } = await db.auth.signInWithPassword({ email, password });
            loading('login', false);

            if (error) {
                // Surface friendly messages for common cases
                if (error.message.includes('Invalid login')) {
                    showAlert('error', 'Incorrect email or password. Please try again.');
                } else if (error.message.includes('Email not confirmed')) {
                    showAlert('error', 'Please confirm your email address first. Check your inbox (and spam folder).');
                } else {
                    showAlert('error', error.message);
                }
            }
            // On success → onAuthStateChange fires → showDashboard()
        }

        // =====================================================
        //  REGISTER
        // =====================================================
        async function handleRegister(e) {
            e.preventDefault();
            clearAlerts();

            const shopName  = document.getElementById('reg-shop-name').value.trim();
            const shopType  = document.getElementById('reg-shop-type').value;
            const city      = document.getElementById('reg-city').value.trim();
            const address   = document.getElementById('reg-address').value.trim();
            const gst       = document.getElementById('reg-gst').value.trim().toUpperCase();
            const ownerName = document.getElementById('reg-owner-name').value.trim();
            const phone     = document.getElementById('reg-phone').value.trim();
            const email     = document.getElementById('reg-email').value.trim();
            const password  = document.getElementById('reg-password').value;

            // Client-side phone validation
            if (!/^[0-9]{10}$/.test(phone)) {
                showAlert('error', 'Please enter a valid 10-digit phone number.');
                return;
            }

            loading('register', true);

            // signUp stores all shop metadata in user_metadata (accessible without extra table)
            const { data, error } = await db.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        shop_name:  shopName,
                        shop_type:  shopType,
                        city:       city,
                        address:    address,
                        gst_number: gst || null,
                        owner_name: ownerName,
                        phone:      phone
                    },
                    // Skip email redirect — user goes straight to app
                    emailRedirectTo: window.location.href
                }
            });

            loading('register', false);

            if (error) {
                if (error.message.includes('already registered') || error.message.includes('already exists')) {
                    showAlert('error', 'This email is already registered. Please sign in instead.');
                } else {
                    showAlert('error', error.message);
                }
                return;
            }

            // Supabase may auto-confirm or require email confirmation depending on project settings.
            // If session is immediately returned, log them in. Otherwise show instructions.
            if (data.session) {
                // Email confirmation disabled in Supabase → user is logged in right away
                showDashboard(data.session.user);
            } else {
                // Email confirmation required
                showAlert('success',
                    `✅ Account created for ${shopName}! A confirmation email has been sent to ${email}. 
            Please click the link in that email, then come back and sign in.`
                );
                switchTab('login');
            }
        }

        // =====================================================
        //  SIGN OUT
        // =====================================================
        async function handleSignOut() {
            await db.auth.signOut();
            // onAuthStateChange fires → showAuth()
        }

        // =====================================================
        //  View Management
        // =====================================================
        function showDashboard(user) {
            // Redirect to app — session is stored by Supabase in localStorage automatically
            window.location.href = 'app.html';
        }

        function showAuth() {
            document.getElementById('auth-card').style.display = 'block';
        }

        // =====================================================
        //  UI Helpers
        // =====================================================
        function loading(form, on) {
            document.getElementById(`${form}-btn`).disabled = on;
            document.getElementById(`${form}-spinner`).classList.toggle('on', on);
            document.getElementById(`${form}-label`).style.opacity = on ? 0 : 1;
        }

        function showAlert(type, msg) {
            const el = document.getElementById(`alert-${type}`);
            el.textContent = msg;
            el.classList.add('on');
        }

        function clearAlerts() {
            document.getElementById('alert-error').classList.remove('on');
            document.getElementById('alert-success').classList.remove('on');
        }
    </script>

</body>

</html>
